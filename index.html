<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>
<link rel="stylesheet" href="contact.css">
</head>

<body>

<!-- 🔥 Intro -->
<section class="intro">
    <video autoplay muted playsinline id="carVideo">
        <source src="316190.mp4" type="video/mp4">
    </video>

    <!-- 🌫️ Smoke Layer -->
    <div class="smoke"></div>
</section>

<!-- 📩 Contact -->
<section class="contact" id="contact">
    <form>
        <h2>Contact Us</h2>
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <textarea placeholder="Message"></textarea>
        <button>Send</button>
    </form>
</section>

<script src="contact.js"></script>
</body>
</html>
